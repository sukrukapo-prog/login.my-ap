name: fitmetrics
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1  # ← ADDED

# ← ADDED (top-level, outside flutter:)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/fittintroimage.jpg
    - assets/images/logo.png
    - assets/images/meditation/movement_meditation.jpg
    - assets/images/meditation/music_meditation.jpg
    - assets/images/meditation/meditation_icon.jpg
    - assets/images/meditation/calmness/birds.png
    - assets/images/meditation/calmness/nature.png
    - assets/images/meditation/calmness/night.png
    - assets/images/meditation/calmness/ocean.png
    - assets/images/meditation/calmness/rain.png
    - assets/images/meditation/calmness/morning.png


